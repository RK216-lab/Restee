<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restee - 休養をデザインする</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'M PLUS Rounded 1c', sans-serif; }
    .pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.7; }
    }
  </style>
</head>
<body class="bg-[#F4F7F5] text-[#3A4D39] min-h-screen flex flex-col items-center justify-between p-4 pb-8">

  <header class="w-full max-w-md text-center py-6">
    <h1 class="text-4xl font-bold text-[#4F6F52] tracking-wide">Restee</h1>
    <p class="text-xs text-[#739072] mt-1">対話で休養をデザインする</p>
    
    <div class="w-full bg-white/60 h-2 rounded-full mt-6 overflow-hidden shadow-xs">
      <div id="progressBar" class="bg-[#739072] h-full w-0 transition-all duration-500"></div>
    </div>
  </header>

  <main class="w-full max-w-md flex-1 flex flex-col justify-center my-4">
    <div id="chatBox" class="bg-white/80 backdrop-blur-md rounded-2xl p-6 shadow-xl border border-white/40 min-h-[250px] flex flex-col justify-between">
      
      <div id="appMessage" class="text-lg font-medium leading-relaxed text-[#2C3E2B]">
        こんにちは！今の体調や気分のことを、なんでも軽くお話ししてくださいね。
      </div>

      <div id="userSpeech" class="mt-4 p-3 bg-[#ECEFF1]/50 rounded-xl text-sm text-[#546E7A] italic min-h-[40px] text-center hidden">
        聞き取り中...
      </div>

      <div id="statusText" class="text-xs text-center text-[#8EACCD] font-bold tracking-widest mt-4">
        1 / 3 ターン目
      </div>
    </div>
  </main>

  <footer class="w-full max-w-md flex flex-col items-center gap-4">
    <button id="micBtn" class="w-20 h-20 bg-[#739072] text-white rounded-full shadow-lg hover:bg-[#4F6F52] active:scale-95 transition-all flex items-center justify-center text-3xl cursor-pointer">
      🎤
    </button>
    <p id="micHint" class="text-sm text-[#739072] font-medium">ボタンを押して話しかけてね</p>
  </footer>

  <div id="resultModal" class="fixed inset-0 bg-black/40 backdrop-blur-xs flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl border border-white max-h-[85vh] overflow-y-auto">
      <h2 class="text-2xl font-bold text-[#4F6F52] text-center mb-4">分析リポート</h2>
      
      <div id="resultContent" class="space-y-6">
        </div>

      <button onclick="location.reload()" class="w-full mt-6 py-3 bg-[#739072] text-white font-bold rounded-xl shadow-md hover:bg-[#4F6F52] transition-colors cursor-pointer">
        もう一度デザインする
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
